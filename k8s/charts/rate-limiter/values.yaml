image:
  repository: europe-west4-docker.pkg.dev/project-id/container-images/rate-limiter
  tag: "d33e6358b6fac3ba0280136a346708027315222b"
  pullPolicy: IfNotPresent

ollamaUrl: "http://ollama.inference.svc.cluster.local:11435"
redisUrl: "redis://redis.ratelimit.svc.cluster.local:6379"
rateLimit: "10"
windowSeconds: "60"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

replicaCount: 1

redis:
  image: redis:8.6.1-alpine
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"