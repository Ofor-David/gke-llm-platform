apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      tolerations:
        - key: "pool"
          operator: "Equal"
          value: "inference"
          effect: "NoSchedule"
      nodeSelector:
        pool: inference
      initContainers:
        - name: pull-model
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              ollama pull {{ .Values.model.name }}
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: model-storage
              mountPath: /models
      containers:
        - name: ollama
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_MODELS
              value: /models
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 120
            periodSeconds: 30
          volumeMounts:
            - name: model-storage
              mountPath: /models

        - name: metrics-exporter
          image: {{ .Values.metricsExporter.image.repository }}:{{ .Values.metricsExporter.image.tag }}
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_URL
              value: "http://localhost:11434"
            - name: INSTANCE_COST_PER_HOUR
              value: "0.031"
          resources:
            {{- toYaml .Values.metricsExporter.resources | nindent 12 }}
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: ollama-models