apiVersion: v1
kind: Service
metadata:
  name: rate-limiter
  namespace: ratelimit
  labels:
    app: rate-limiter
spec:
  selector:
    app: rate-limiter
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ratelimit
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379