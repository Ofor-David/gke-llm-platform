apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter
  namespace: ratelimit
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: rate-limiter
  template:
    metadata:
      labels:
        app: rate-limiter
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: rate-limiter
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8001
          env:
            - name: OLLAMA_URL
              value: {{ .Values.ollamaUrl }}
            - name: REDIS_URL
              value: {{ .Values.redisUrl }}
            - name: RATE_LIMIT
              value: {{ .Values.rateLimit | quote }}
            - name: WINDOW_SECONDS
              value: {{ .Values.windowSeconds | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ratelimit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}