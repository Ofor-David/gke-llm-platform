repositories:
  - name: cert-manager
    url: https://charts.jetstack.io
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: linkerd-edge
    url: https://helm.linkerd.io/edge
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: kedacore
    url: https://kedacore.github.io/charts

releases:
  # Cert-Manager
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager/cert-manager
    version: 1.19.2
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: pre
    values:
      - values/cert-manager.yaml

  # Trust-Manager
  - name: trust-manager
    namespace: cert-manager
    chart: cert-manager/trust-manager
    version: 0.21.1
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: pre
    values:
      - values/trust-manager.yaml
    needs:
      - cert-manager/cert-manager

  # Linkerd CRDs
  - name: linkerd-crds
    namespace: linkerd
    chart: linkerd-edge/linkerd-crds
    version: 2026.2.1
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: pre
    needs:
      - cert-manager/trust-manager

  # External secrets
  - name: external-secrets
    namespace: cert-manager
    chart: external-secrets/external-secrets
    version: 2.0.0
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: pre

  - name: keda
    namespace: keda
    chart: kedacore/keda
    version: 2.19.0
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: pre

  #--------------------------------------------------------
  #-----------------------------------------------------------POST
  #--------------------------------------------------------
  # Linkerd Control Plane
  - name: linkerd-control-plane
    namespace: linkerd
    chart: linkerd-edge/linkerd-control-plane
    version: 2026.2.1
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: post
    values:
      - identity:
          externalCA: true
          issuer:
            scheme: kubernetes.io/tls
    needs:
      - linkerd/linkerd-crds
      - cert-manager/trust-manager

    # Kube-Prometheus Stack
  - name: kube-prometheus
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 82.1.0
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: post
    values:
      - values/kube-prometheus.yaml

    # Auth service
  - name: auth-service
    namespace: auth
    chart: ./helm/auth-service
    version: 0.1.0
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: post
    needs:
      - monitoring/kube-prometheus
      - linkerd/linkerd-control-plane
      
    # inference Server
  - name: ollama
    namespace: inference
    chart: ./helm/ollama
    version: 0.1.0
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: post
    needs:
      - auth/auth-service
      - linkerd/linkerd-control-plane

  # linkerd viz(optional)
  - name: linkerd-viz
    namespace: linkerd
    chart: linkerd-edge/linkerd-viz
    version: 2026.2.1
    createNamespace: false
    installed: true
    wait: true
    labels:
      order: post
    needs:
      - linkerd/linkerd-control-plane
