apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference-route
  namespace: gateway-api
spec:
  parentRefs:
    - name: llm-platform-gateway
      namespace: gateway-api
      sectionName: https  
  hostnames:
    - api.xikhub.store
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: auth-service
          namespace: auth
          port: 80
---
# Grafana
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: gateway-api
spec:
  parentRefs:
    - name: llm-platform-gateway
      namespace: gateway-api
      sectionName: https  
  hostnames:
    - grafana.xikhub.store
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-grafana
          namespace: monitoring
          port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: gateway-api
spec:
  parentRefs:
    - name: llm-platform-gateway
      namespace: gateway-api
      sectionName: https  
  hostnames:
    - argocd.xikhub.store
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: gateway-api
spec:
  parentRefs:
    - name: llm-platform-gateway
      namespace: gateway-api
      sectionName: http        # attaches only to the port 80 listener
  hostnames:
    - "api.xikhub.store"              
    - "grafana.xikhub.store"
    - "argocd.xikhub.store"

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301    