# Default deny all ingress and egress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: ratelimit
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow rate-limiter to accept ingress from auth namespace (via Linkerd proxy port 4143)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-ingress
  namespace: ratelimit
spec:
  podSelector:
    matchLabels:
      app: rate-limiter
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
      ports:
        - protocol: TCP
          port: 4143
---
# Allow Redis to accept ingress from rate-limiter pod (via Linkerd proxy port 4143)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: ratelimit
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rate-limiter
      ports:
        - protocol: TCP
          port: 4143
---
# Allow rate-limiter to egress to inference namespace and Redis (via Linkerd proxy port 4143)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: ratelimit
spec:
  podSelector:
    matchLabels:
      app: rate-limiter
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: inference
      ports:
        - protocol: TCP
          port: 4143
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 4143

---
# Allow egress to Linkerd control plane and kube-system for mTLS identity and DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd-egress
  namespace: ratelimit
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
