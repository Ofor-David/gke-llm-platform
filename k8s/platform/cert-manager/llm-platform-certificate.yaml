apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: llm-platform-tls
  namespace: gateway-api
spec:
  secretName: gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.your-domain.com
    - argocd.your-domain.com
    - grafana.your-domain.com