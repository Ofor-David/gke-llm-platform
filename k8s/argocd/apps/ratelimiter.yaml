apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rate-limiter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/Ofor-David/gke-llm-platform.git
    path: k8s/charts/rate-limiter           
    targetRevision: main                    
  destination:
    server: https://kubernetes.default.svc
    namespace: ratelimit
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
