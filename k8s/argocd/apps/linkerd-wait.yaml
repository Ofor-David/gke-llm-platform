apiVersion: batch/v1
kind: Job
metadata:
  name: linkerd-wait
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
      - name: sleep
        image: alpine:latest
        command: ["sleep", "30"]
      restartPolicy: Never
  backoffLimit: 1
